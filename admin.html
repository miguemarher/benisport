<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel de Administración</title>
<style>
body{
  background:#0a0a0a;
  color:white;
  font-family:Arial;
  padding:40px;
}
.container{
  max-width:800px;
  margin:auto;
  background:#111;
  padding:30px;
  border-radius:15px;
  box-shadow:0 0 20px rgba(0,255,0,0.3);
}
input, select{
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
  border:none;
}
button{
  padding:10px 20px;
  background:#bfff00;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}
button:hover{
  background:#d4ff4d;
}
.table{
  margin-top:30px;
  width:100%;
  border-collapse:collapse;
}
.table th, .table td{
  padding:10px;
  border-bottom:1px solid #333;
}
.login-box{
  max-width:400px;
  margin:auto;
  background:#111;
  padding:30px;
  border-radius:15px;
  text-align:center;
  box-shadow:0 0 20px rgba(0,255,0,0.3);
}
</style>
</head>
<body>

<div id="login" class="login-box">
<h2>Panel de Administración</h2>
<p>Introduce la contraseña</p>
<input type="password" id="password">
<button onclick="login()">Entrar</button>
<p id="error" style="color:red;"></p>
</div>

<div id="panel" style="display:none;">
<div class="container">
<h2>Gestión de Participantes</h2>

<h3>Añadir Participante</h3>
<input type="text" id="name" placeholder="Nombre">
<input type="number" id="points" placeholder="Puntos">
<select id="gender">
  <option value="M">Masculino</option>
  <option value="F">Femenino</option>
</select>
<button onclick="addParticipant()">Añadir</button>

<h3>Participantes Masculinos</h3>
<table class="table" id="tableM"></table>

<h3>Participantes Femeninos</h3>
<table class="table" id="tableF"></table>

</div>
</div>

<script>
function login(){
  const pass = document.getElementById("password").value;
  if(pass === "admin1234"){
    document.getElementById("login").style.display="none";
    document.getElementById("panel").style.display="block";
    loadTables();
  } else {
    document.getElementById("error").innerText = "Contraseña incorrecta";
  }
}

function loadTables(){
  let rankingM = JSON.parse(localStorage.getItem("rankingM")) || [];
  let rankingF = JSON.parse(localStorage.getItem("rankingF")) || [];

  const tableM = document.getElementById("tableM");
  const tableF = document.getElementById("tableF");

  tableM.innerHTML = "<tr><th>Nombre</th><th>Puntos</th><th>Acciones</th></tr>";
  tableF.innerHTML = "<tr><th>Nombre</th><th>Puntos</th><th>Acciones</th></tr>";

  rankingM.forEach((a,i)=>{
    tableM.innerHTML += `
      <tr>
        <td>${a.name}</td>
        <td>${a.points}</td>
        <td>
          <button onclick="editParticipant('M',${i})">Editar</button>
          <button onclick="deleteParticipant('M',${i})">Eliminar</button>
        </td>
      </tr>`;
  });

  rankingF.forEach((a,i)=>{
    tableF.innerHTML += `
      <tr>
        <td>${a.name}</td>
        <td>${a.points}</td>
        <td>
          <button onclick="editParticipant('F',${i})">Editar</button>
          <button onclick="deleteParticipant('F',${i})">Eliminar</button>
        </td>
      </tr>`;
  });
}

function addParticipant(){
  let name = document.getElementById("name").value;
  let points = parseInt(document.getElementById("points").value);
  let gender = document.getElementById("gender").value;

  if(!name || isNaN(points)){
    alert("Rellena todos los campos");
    return;
  }

  let ranking = JSON.parse(localStorage.getItem("ranking" + gender)) || [];
  ranking.push({name, points});
  localStorage.setItem("ranking" + gender, JSON.stringify(ranking));

  loadTables();
}

function editParticipant(gender, index){
  let ranking = JSON.parse(localStorage.getItem("ranking" + gender));
  let newName = prompt("Nuevo nombre:", ranking[index].name);
  let newPoints = parseInt(prompt("Nuevos puntos:", ranking[index].points));

  if(newName && !isNaN(newPoints)){
    ranking[index].name = newName;
    ranking[index].points = newPoints;
    localStorage.setItem("ranking" + gender, JSON.stringify(ranking));
    loadTables();
  }
}

function deleteParticipant(gender, index){
  let ranking = JSON.parse(localStorage.getItem("ranking" + gender));
  if(confirm("¿Seguro que quieres eliminar este participante?")){
    ranking.splice(index,1);
    localStorage.setItem("ranking" + gender, JSON.stringify(ranking));
    loadTables();
  }
}
</script>

</body>
</html>
