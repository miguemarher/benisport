<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Benisport Games</title>
<style>
body{
  background:#0a0a0a;
  color:white;
  font-family:Arial;
  padding:20px;
}
h2{
  color:#bfff00;
  margin-top:40px;
}
.card{
  background:#111;
  padding:20px;
  border-radius:12px;
  width:280px;
  box-shadow:0 0 10px rgba(0,255,0,0.2);
}
.card img{
  width:100%;
  border-radius:10px;
  margin-bottom:10px;
}
.container{
  display:flex;
  flex-wrap:wrap;
  gap:20px;
}
.table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
}
.table th, .table td{
  padding:10px;
  border-bottom:1px solid #333;
}
</style>
</head>
<body>

<h1 style="color:#bfff00;">Benisport Games</h1>

<!-- RANKING MASCULINO -->
<h2>Ranking Masculino</h2>
<table class="table" id="rankingM"></table>

<!-- RANKING FEMENINO -->
<h2>Ranking Femenino</h2>
<table class="table" id="rankingF"></table>

<!-- EVENTOS -->
<h2>Próximos Eventos</h2>
<div id="eventosContainer" class="container"></div>

<!-- NOTICIAS -->
<h2>Noticias Oficiales</h2>
<div id="noticiasContainer" class="container"></div>

<script>
/* CARGAR RANKINGS */
function cargarRankings(){
  let rankingM = JSON.parse(localStorage.getItem("rankingM")) || [];
  let rankingF = JSON.parse(localStorage.getItem("rankingF")) || [];

  let tablaM = document.getElementById("rankingM");
  let tablaF = document.getElementById("rankingF");

  tablaM.innerHTML = "<tr><th>Nombre</th><th>Puntos</th></tr>";
  tablaF.innerHTML = "<tr><th>Nombre</th><th>Puntos</th></tr>";

  rankingM.sort((a,b)=>b.points - a.points);
  rankingF.sort((a,b)=>b.points - a.points);

  rankingM.forEach(a=>{
    tablaM.innerHTML += `
      <tr>
        <td>${a.name}</td>
        <td>${a.points}</td>
      </tr>
    `;
  });

  rankingF.forEach(a=>{
    tablaF.innerHTML += `
      <tr>
        <td>${a.name}</td>
        <td>${a.points}</td>
      </tr>
    `;
  });
}

/* CARGAR EVENTOS */
function cargarEventos(){
  let eventos = JSON.parse(localStorage.getItem("eventos")) || [];
  let cont = document.getElementById("eventosContainer");
  cont.innerHTML = "";

  eventos.forEach(ev=>{
    cont.innerHTML += `
      <div class="card">
        <h3 style="color:#bfff00;">${ev.titulo}</h3>
        <p><strong>Fecha:</strong> ${ev.fecha}</p>
        <p>${ev.descripcion}</p>
      </div>
    `;
  });
}

/* CARGAR NOTICIAS */
function cargarNoticias(){
  let noticias = JSON.parse(localStorage.getItem("noticias")) || [];
  let cont = document.getElementById("noticiasContainer");
  cont.innerHTML = "";

  noticias.forEach(n=>{
    cont.innerHTML += `
      <div class="card">
        ${n.imagen ? `<img src="${n.imagen}">` : ""}
        <h3 style="color:#bfff00;">${n.titulo}</h3>
        <p>${n.texto}</p>
        <p style="font-size:12px; opacity:0.7;">${n.fecha}</p>
      </div>
    `;
  });
}

/* INICIO */
cargarRankings();
cargarEventos();
cargarNoticias();
</script>

</body>
</html>
